apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-demo
  namespace: demo-im
  labels:
    app: im-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: im-demo
  template:
    metadata:
      labels:
        app: im-demo
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/role: "api"
        vault.hashicorp.com/agent-inject-secret-config: "api/data/im-demo/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "api/data/im-demo/config" -}}
          export API_AUTH_TOKEN={{ .Data.data.API_AUTH_TOKEN }}
          export DS2_WEBHOOK_USERNAME={{ .Data.data.DS2_WEBHOOK_USERNAME }}
          export DS2_WEBHOOK_PASSWORD={{ .Data.data.DS2_WEBHOOK_PASSWORD }}
          export SITE_AUTH_B64={{ .Data.data.SITE_AUTH_B64 }}
          {{- end }}
        vault.hashicorp.com/agent-inject-secret-edgerc: "api/data/im-demo/edgerc"
        vault.hashicorp.com/agent-inject-template-edgerc: |
          {{- with secret "api/data/im-demo/edgerc" -}}
          {{ .Data.data.content }}
          {{- end }}
    spec:
      serviceAccountName: app-vault-access
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: im-demo
          image: harbor.harbor.svc.cluster.local/presales/im-demo:v4
          command: ["/bin/sh", "-c"]
          args: [". /vault/secrets/config && exec node dist/index.js"]
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: im-demo-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
