apiVersion: apps/v1
kind: Deployment
metadata:
  name: im-demo
  namespace: demo-im
  labels:
    app: im-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: im-demo
  template:
    metadata:
      labels:
        app: im-demo
    spec:
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: im-demo
          image: harbor.harbor.svc.cluster.local/presales/im-demo:v2
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: im-demo-config
            - secretRef:
                name: im-demo-secrets
          volumeMounts:
            - name: edgerc
              mountPath: /etc/akamai
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: edgerc
          secret:
            secretName: edgerc
