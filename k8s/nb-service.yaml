apiVersion: v1
kind: Service
metadata:
  name: im-demo-nb
  namespace: demo-im
  labels:
    app: im-demo
  annotations:
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "0"
    service.beta.kubernetes.io/linode-loadbalancer-default-protocol: https
    service.beta.kubernetes.io/linode-loadbalancer-port-443: '{"tls-secret-name": "origin-im-demo-tls", "protocol": "https"}'
spec:
  type: LoadBalancer
  selector:
    app: im-demo
  ports:
    - name: https
      port: 443
      targetPort: 3001
      protocol: TCP
