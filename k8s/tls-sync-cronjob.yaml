apiVersion: batch/v1
kind: CronJob
metadata:
  name: tls-vault-sync
  namespace: demo-im
  labels:
    app: vault
    tier: ops
    project: presales-landing-zone
spec:
  schedule: "0 */12 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: app-vault-access
          containers:
            - name: sync
              image: hashicorp/vault:1.15.4
              command: ["/bin/sh", "-c"]
              args:
                - |
                  export VAULT_ADDR=http://vault.central-services.svc.cluster.local:8200
                  JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=api jwt="$JWT")
                  export VAULT_TOKEN
                  vault kv put api/im-demo/tls \
                    tls_crt="$(cat /tls/im-demo/tls.crt)" \
                    tls_key="$(cat /tls/im-demo/tls.key)"
                  echo "im-demo TLS synced to Vault at $(date)"
              volumeMounts:
                - name: im-demo-tls
                  mountPath: /tls/im-demo
                  readOnly: true
          volumes:
            - name: im-demo-tls
              secret:
                secretName: origin-im-demo-tls
          restartPolicy: OnFailure
